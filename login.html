<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyCards – Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="bg-blobs">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <a href="landing.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>

    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Logo -->
            <a href="landing.html" class="auth-logo">
                <i class="fa-solid fa-layer-group"></i> StudyCards
            </a>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="tab-btn active" id="tab-signin">Sign In</button>
                <button class="tab-btn" id="tab-signup">Sign Up</button>
            </div>

            <!-- Error / Success Banner -->
            <div class="auth-banner hidden" id="auth-banner"></div>

            <!-- Sign In Form -->
            <form id="form-signin" class="auth-form">
                <div class="field-group">
                    <label for="signin-email">Email</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="signin-email" placeholder="you@example.com" required
                            autocomplete="email">
                    </div>
                </div>
                <div class="field-group">
                    <label for="signin-password">Password</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="signin-password" placeholder="••••••••" required
                            autocomplete="current-password">
                        <button type="button" class="toggle-pw" data-target="signin-password" tabindex="-1">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="btn-signin">
                    <span>Sign In</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <!-- Sign Up Form -->
            <form id="form-signup" class="auth-form hidden">
                <div class="field-group">
                    <label for="signup-name">Full Name</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="signup-name" placeholder="Jane Doe" required autocomplete="name">
                    </div>
                </div>
                <div class="field-group">
                    <label for="signup-email">Email</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="signup-email" placeholder="you@example.com" required
                            autocomplete="email">
                    </div>
                </div>
                <div class="field-group">
                    <label for="signup-password">Password <span class="hint">(min. 6 characters)</span></label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="signup-password" placeholder="••••••••" required
                            autocomplete="new-password" minlength="6">
                        <button type="button" class="toggle-pw" data-target="signup-password" tabindex="-1">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="btn-signup">
                    <span>Create Account</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <p class="auth-switch" id="auth-switch-text">
                Don't have an account? <button class="link-btn" id="switch-to-signup">Sign up free</button>
            </p>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="login.js"></script>
</body>

</html>
